name: Build Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack:latest
            ghcr.io/jurczykpawel/reelstack:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build worker into local daemon first, then push with docker CLI.
      # buildx --push fails for brand-new GHCR packages (403 on blob HEAD).
      - name: Build worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          load: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack-worker:latest
            ghcr.io/jurczykpawel/reelstack-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push worker
        run: |
          docker push ghcr.io/jurczykpawel/reelstack-worker:latest
          docker push ghcr.io/jurczykpawel/reelstack-worker:${{ github.sha }}

      # Same for reel-worker
      - name: Build reel-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.reel-worker
          push: false
          load: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack-reel-worker:latest
            ghcr.io/jurczykpawel/reelstack-reel-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push reel-worker
        run: |
          docker push ghcr.io/jurczykpawel/reelstack-reel-worker:latest
          docker push ghcr.io/jurczykpawel/reelstack-reel-worker:${{ github.sha }}
